<!DOCTYPE html>
<html>
<head><title>k = 1 - r1/d (d 비교)</title></head>
<body style="margin:20px;background:#111;color:#fff;font-family:monospace">
<h3>k = 1 - r1 / d</h3>
<canvas id="c" width="500" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 400;
const pad = 50;
const maxR = 300;

// 배경
ctx.fillStyle = '#222';
ctx.fillRect(0, 0, W, H);

// 축
ctx.strokeStyle = '#666';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(pad, pad);
ctx.lineTo(pad, H - pad);
ctx.lineTo(W - pad, H - pad);
ctx.stroke();

// 축 라벨
ctx.fillStyle = '#aaa';
ctx.font = '12px monospace';
ctx.fillText('k', pad - 5, pad - 10);
ctx.fillText('1.0', pad - 35, pad + 5);
ctx.fillText('0', pad - 15, H - pad + 5);
ctx.fillText('0', pad - 5, H - pad + 15);
ctx.fillText('r1', W - pad + 10, H - pad + 5);
ctx.fillText(maxR, W - pad - 10, H - pad + 15);

// 그래프들
const lines = [
    { d: 20,  color: '#4fc3f7' },
    { d: 100, color: '#81c784' },
    { d: 300, color: '#ffb74d' },
];

for (const { d, color } of lines) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let r1 = 0; r1 <= d; r1 += 0.5) {
        const k = 1 - r1 / d;
        const px = pad + (r1 / maxR) * (W - 2 * pad);
        const py = pad + (1 - k) * (H - 2 * pad);
        if (r1 === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();
}

// 범례
let ly = pad + 10;
for (const { d, color } of lines) {
    ctx.fillStyle = color;
    ctx.fillRect(W - pad - 100, ly, 14, 14);
    ctx.fillStyle = '#fff';
    ctx.fillText(`d = ${d}`, W - pad - 80, ly + 12);
    ly += 22;
}
</script>
</body>
</html>
